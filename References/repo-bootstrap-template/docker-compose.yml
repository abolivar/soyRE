services:
  postgres:
    image: postgres:17-alpine
    container_name: brokerops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brokerops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brokerops}
      POSTGRES_DB: ${POSTGRES_DB:-brokerops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - brokerops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brokerops} -d ${POSTGRES_DB:-brokerops}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  brokerops_postgres_data:
